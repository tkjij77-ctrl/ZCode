name: Build Windows Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build ZCode for Windows
      run: go build -o zcode.exe main.go

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: zcode.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
